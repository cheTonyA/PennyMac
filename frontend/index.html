<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Movers Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Pennymac TRE Project</p>
      <h1>Daily Stock Mover Dashboard</h1>
      <p class="subtitle">
        Tracks the top daily mover from AAPL, MSFT, GOOGL, AMZN, TSLA, and NVDA.
      </p>
    </section>

    <section class="card">
      <div class="card-header">
        <div>
          <h2>Last 7 Winning Stocks</h2>
          <p>Highest absolute percentage move from open to close.</p>
        </div>
        <button id="refreshBtn">Refresh</button>
      </div>

      <div id="status" class="status">Loading data...</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Ticker</th>
              <th>Close</th>
              <th>% Change</th>
            </tr>
          </thead>
          <tbody id="moversTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
